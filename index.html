<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Course Decision Making</title>
    <style>
        :root {
            --bg: #f4efe4;
            --panel: rgba(255, 252, 245, 0.92);
            --panel-strong: #fffaf1;
            --panel-soft: rgba(255, 250, 241, 0.74);
            --ink: #1f2a2e;
            --muted: #5a6a70;
            --line: rgba(31, 42, 46, 0.14);
            --accent: #0b7285;
            --accent-soft: rgba(11, 114, 133, 0.12);
            --shadow: 0 18px 40px rgba(36, 48, 53, 0.12);
            --touch-target: 44px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, serif;
            line-height: 1.8;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(11, 114, 133, 0.12), transparent 24rem),
                linear-gradient(180deg, #f8f3e9 0%, var(--bg) 40%, #efe7d6 100%);
        }

        button, select {
            font: inherit;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.82);
            color: var(--ink);
            cursor: pointer;
            min-height: var(--touch-target);
            padding: 0.5rem 1rem;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #app {
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 1rem;
            height: 100vh;
            padding: 1rem;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1rem;
            background: var(--panel);
            border-radius: 16px;
            box-shadow: var(--shadow);
            flex-wrap: wrap;
        }

        .controls {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        #readerMain {
            overflow-y: auto;
            background: var(--panel-strong);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 2rem;
        }

        #bookContent {
            max-width: 42rem;
            margin: 0 auto;
            font-size: 1.1rem;
            transition: opacity 180ms ease;
        }

        #bookContent.is-fading {
            opacity: 0.3;
        }

        #bookContent h1, #bookContent h2 {
            font-weight: 500;
            margin: 2em 0 0.8em;
        }

        #bookContent p {
            margin: 1.2em 0;
        }

        footer {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: var(--panel);
            border-radius: 16px;
            box-shadow: var(--shadow);
            flex-wrap: wrap;
            align-items: center;
        }

        .progress-container {
            flex: 1;
            min-width: 200px;
        }

        .progress-bar {
            height: 6px;
            background: var(--accent-soft);
            border-radius: 999px;
            margin-bottom: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 999px;
            transition: width 300ms ease;
        }

        .audio-controls {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .chapter-btn {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }

        .chapter-btn.active {
            background: var(--accent);
            color: white;
        }

        #chapterNav {
            display: none;
        }

        #chatMessages, #chatInput, #sendBtn, #resumeIndicator, #audioMeta {
            display: none;
        }

        @media (max-width: 640px) {
            header, footer {
                flex-direction: column;
                align-items: stretch;
            }
            .controls, .audio-controls {
                justify-content: stretch;
            }
            .controls button, .audio-controls button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <div>
                <p style="margin: 0; color: var(--muted); font-size: 0.95rem;" id="currentSection">Loading...</p>
                <p style="margin: 0; color: var(--muted); font-size: 0.85rem;" id="audioChapterLabel"></p>
            </div>
            <div class="controls">
                <button id="prevPageBtn">Previous</button>
                <select id="pageJumpSelect">
                    <option>Loading...</option>
                </select>
                <button id="nextPageBtn">Next</button>
            </div>
        </header>

        <main id="readerMain">
            <article id="bookContent">
                <p>Loading book content...</p>
            </article>
        </main>

        <footer>
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <p style="margin: 0; color: var(--muted); font-size: 0.85rem;">
                    <span id="pageIndicator">Page 1 of 1</span> · 
                    <span id="progressPercent">0%</span> · 
                    <span id="progressDetail"></span>
                </p>
            </div>
            <div class="audio-controls">
                <button class="chapter-btn" data-audio-key="preface">Preface</button>
                <button class="chapter-btn" data-audio-key="prologue-1">Prologue 1</button>
                <button class="chapter-btn" data-audio-key="prologue-2">Prologue 2</button>
                <button class="chapter-btn" data-audio-key="prologue-3">Prologue 3</button>
            </div>
        </footer>
    </div>

    <!-- Hidden elements needed by reader.js -->
    <div id="chapterNav"></div>
    <div id="chatMessages"></div>
    <input type="text" id="chatInput">
    <button id="sendBtn">Send</button>
    <p id="resumeIndicator" hidden></p>
    <p id="audioMeta"></p>
    <audio id="audioPlayer"></audio>

    <!-- Load book content first, then reader -->
    <script src="book-content.js"></script>
    <script src="reader.js"></script>
</body>
</html>
