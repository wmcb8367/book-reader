<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Course Decision Making</title>
    <style>
        :root {
            --bg: #f4efe4;
            --panel: rgba(255, 252, 245, 0.92);
            --panel-strong: #fffaf1;
            --panel-soft: rgba(255, 250, 241, 0.74);
            --ink: #1f2a2e;
            --muted: #5a6a70;
            --line: rgba(31, 42, 46, 0.14);
            --accent: #0b7285;
            --accent-soft: rgba(11, 114, 133, 0.12);
            --shadow: 0 18px 40px rgba(36, 48, 53, 0.12);
            --chat-shell: rgba(249, 252, 250, 0.74);
            --chat-shell-strong: rgba(255, 255, 255, 0.78);
            --chat-line: rgba(86, 111, 120, 0.18);
            --chat-shadow: 0 28px 70px rgba(20, 43, 52, 0.2);
            --chat-shadow-strong: 0 24px 48px rgba(20, 43, 52, 0.16), 0 12px 22px rgba(20, 43, 52, 0.08);
            --chat-glow: 0 0 0 1px rgba(255, 255, 255, 0.26), 0 0 0 10px rgba(31, 168, 181, 0.08);
            --chat-accent-start: #0ea5a8;
            --chat-accent-end: #14b8a6;
            --chat-accent-soft: rgba(20, 184, 166, 0.14);
            --chat-text-subtle: #58707a;
            --chat-user-text: #f6fffe;
            --touch-target: 44px;
            --safe-bottom: max(1rem, env(safe-area-inset-bottom, 0px));
            --safe-side: max(0.85rem, env(safe-area-inset-left, 0px), env(safe-area-inset-right, 0px));
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: Georgia, serif;
            line-height: 1.8;
            color: var(--ink);
            overflow: hidden;
            background:
                radial-gradient(circle at top left, rgba(11, 114, 133, 0.12), transparent 24rem),
                linear-gradient(180deg, #f8f3e9 0%, var(--bg) 40%, #efe7d6 100%);
        }

        body.splash-active {
            overflow: hidden;
        }

        button,
        select,
        input {
            font: inherit;
            touch-action: manipulation;
        }

        button,
        select {
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.82);
            color: var(--ink);
        }

        button {
            cursor: pointer;
            transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
            min-height: var(--touch-target);
        }

        button:focus-visible,
        select:focus-visible {
            border-color: rgba(11, 114, 133, 0.35);
            outline: none;
        }

        select,
        input {
            min-height: var(--touch-target);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            cursor: not-allowed;
            transform: none;
            opacity: 0.5;
        }

        #splash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: linear-gradient(135deg, #f8f3e9 0%, var(--bg) 50%, #efe7d6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transition: opacity 600ms ease;
        }

        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .splash-content {
            text-align: center;
            padding: 2rem;
        }

        .splash-title {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 400;
            color: var(--ink);
            margin: 0 0 1rem;
            letter-spacing: -0.02em;
        }

        .splash-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            color: var(--muted);
            margin: 0 0 2.5rem;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--accent-soft);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #app {
            display: none;
            height: 100vh;
            height: 100dvh;
            padding: var(--safe-side);
            padding-bottom: var(--safe-bottom);
        }

        #app.ready {
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 1rem;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1rem;
            background: var(--panel);
            border-radius: 16px;
            box-shadow: var(--shadow);
            flex-wrap: wrap;
        }

        .section-label {
            font-size: 0.95rem;
            color: var(--muted);
            margin: 0;
        }

        .controls {
            display: flex;
            gap: 0.6rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .controls button,
        .controls select {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        main {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background: var(--panel-strong);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 2rem clamp(1rem, 4vw, 3rem);
        }

        #reader {
            max-width: 42rem;
            margin: 0 auto;
            font-size: clamp(1.05rem, 2.2vw, 1.15rem);
            line-height: 1.8;
        }

        #reader h1,
        #reader h2,
        #reader h3 {
            font-weight: 500;
            line-height: 1.3;
            margin: 2em 0 0.8em;
            color: var(--ink);
        }

        #reader h1 {
            font-size: 2em;
        }

        #reader h2 {
            font-size: 1.5em;
        }

        #reader p {
            margin: 1.2em 0;
        }

        #reader img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1.5em 0;
        }

        footer {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: var(--panel);
            border-radius: 16px;
            box-shadow: var(--shadow);
            flex-wrap: wrap;
            align-items: center;
        }

        .progress-container {
            flex: 1;
            min-width: 200px;
        }

        .progress-bar {
            height: 6px;
            background: var(--accent-soft);
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 999px;
            transition: width 300ms ease;
        }

        .audio-controls {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .audio-controls button {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }

        audio {
            display: none;
        }

        @media (max-width: 640px) {
            header,
            footer {
                flex-direction: column;
                align-items: stretch;
            }

            .controls,
            .audio-controls {
                justify-content: stretch;
            }

            .controls button,
            .controls select,
            .audio-controls button {
                flex: 1;
                min-width: 0;
            }
        }
    </style>
</head>
<body>
    <div id="splash">
        <div class="splash-content">
            <h1 class="splash-title">Race Course Decision Making</h1>
            <p class="splash-subtitle">Loading reader...</p>
            <div class="spinner"></div>
        </div>
    </div>

    <div id="app">
        <header>
            <p class="section-label" id="section-label">Loading...</p>
            <div class="controls">
                <button id="prev-page" disabled>Previous</button>
                <select id="page-jump" disabled>
                    <option>Jump to page...</option>
                </select>
                <button id="next-page" disabled>Next</button>
            </div>
        </header>

        <main>
            <article id="reader">
                <p>Loading book content...</p>
            </article>
        </main>

        <footer>
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                </div>
                <p class="section-label" id="page-indicator">Page 1 of 1</p>
            </div>
            <div class="audio-controls">
                <p class="section-label">Audiobook</p>
                <button id="audio-preface">Preface</button>
                <button id="audio-prologue-1">Prologue 1</button>
                <button id="audio-prologue-2">Prologue 2</button>
                <button id="audio-prologue-3">Prologue 3</button>
            </div>
        </footer>
    </div>

    <audio id="audio-player" controls></audio>

    <!-- Load book content first -->
    <script src="book-content.js"></script>
    <!-- Then load and initialize reader -->
    <script src="reader.js"></script>
</body>
</html>
